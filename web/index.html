<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tower 总控台</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--line:#30363d;--ink:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
  *{box-sizing:border-box} body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto;background:var(--bg);color:var(--ink)}
  header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  h1{font-size:16px;margin:0} main{max-width:920px;margin:0 auto;padding:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  .card h2{font-size:14px;margin:0 0 12px} input,button{font:inherit;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:#0b0e13;color:var(--ink)}
  button{background:var(--accent);color:#06121f;border:0;cursor:pointer;font-weight:600} button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;font-size:13px} th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)} th{color:var(--muted);font-weight:500}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px} .muted{color:var(--muted)} .hide{display:none}
  code{background:#0b0e13;padding:2px 6px;border-radius:6px;word-break:break-all}
  @media(max-width:640px){main{padding:10px}.card{padding:12px}}
</style></head>
<body>
<header><h1>Tower 总控台</h1><span id="who" class="muted"></span><span style="flex:1"></span><button id="logout" class="ghost hide">登出</button></header>
<main>
  <div id="login" class="card">
    <h2>登录</h2>
    <div class="row"><input id="u" placeholder="用户名"><input id="p" type="password" placeholder="密码"><button onclick="login()">登录</button></div>
    <div id="loginErr" class="muted"></div>
  </div>

  <div id="app" class="hide">
    <div class="card">
      <h2>调度密钥(给 new-api 用)</h2>
      <div class="row"><input id="klabel" placeholder="备注(如 new-api)"><button onclick="createKey()">新建密钥</button></div>
      <div id="newkey" class="muted"></div>
      <table id="keys"><thead><tr><th>前缀</th><th>备注</th><th>启用</th><th></th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card">
      <h2>节点</h2>
      <div class="row"><input id="nname" placeholder="名称"><input id="nurl" placeholder="http://ip:3456"><input id="nkey" placeholder="节点 api key"><button onclick="addNode()">添加</button></div>
      <table id="nodes"><thead><tr><th>名称</th><th>地址</th><th>启用</th><th></th></tr></thead><tbody></tbody></table>
    </div>
  </div>
</main>
<script>
const $=s=>document.querySelector(s);
async function api(m,p,b){const o={method:m,headers:{}};if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}const r=await fetch(p,o);if(r.status===401){show(false);throw new Error('unauth')}return r}
function show(authed){$('#login').classList.toggle('hide',authed);$('#app').classList.toggle('hide',!authed);$('#logout').classList.toggle('hide',!authed)}
async function login(){const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('#u').value,password:$('#p').value})});if(!r.ok){$('#loginErr').textContent='登录失败';return}const j=await r.json();$('#who').textContent=j.role;show(true);refresh()}
async function me(){try{const r=await fetch('/auth/me');if(r.ok){const j=await r.json();$('#who').textContent=j.role;show(true);refresh()}else show(false)}catch(e){show(false)}}
$('#logout').onclick=async()=>{await fetch('/auth/logout',{method:'POST'});show(false)};
async function refresh(){await loadKeys();await loadNodes()}
async function loadNodes(){const r=await api('GET','/api/admin/nodes');const rows=await r.json();const tb=$('#nodes tbody');tb.innerHTML='';rows.forEach(n=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${esc(n.name)}</td><td class=muted>${esc(n.baseUrl)}</td><td>${n.enabled?'✓':'—'}</td><td><button class=ghost data-id="${n.id}">删除</button></td>`;tr.querySelector('button').onclick=()=>delNode(n.id);tb.appendChild(tr)})}
async function addNode(){await api('POST','/api/admin/nodes',{name:$('#nname').value,baseUrl:$('#nurl').value,apiKey:$('#nkey').value});$('#nname').value=$('#nurl').value=$('#nkey').value='';loadNodes()}
async function delNode(id){await api('DELETE','/api/admin/nodes/'+id);loadNodes()}
async function loadKeys(){const r=await api('GET','/api/admin/dispatch-keys');const rows=await r.json();const tb=$('#keys tbody');tb.innerHTML='';rows.forEach(k=>{const tr=document.createElement('tr');tr.innerHTML=`<td><code>${esc(k.prefix)}</code></td><td>${esc(k.label)}</td><td>${k.enabled?'✓':'—'}</td><td><button class=ghost data-id="${k.id}">停用</button></td>`;tr.querySelector('button').onclick=()=>delKey(k.id);tb.appendChild(tr)})}
async function createKey(){const r=await api('POST','/api/admin/dispatch-keys',{label:$('#klabel').value});const j=await r.json();$('#newkey').innerHTML='新密钥(仅显示一次): <code>'+esc(j.key)+'</code>';$('#klabel').value='';loadKeys()}
async function delKey(id){await api('DELETE','/api/admin/dispatch-keys/'+id);loadKeys()}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
me();
</script>
</body></html>
